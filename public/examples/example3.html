<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Voxel Heightmap</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #5ce1e6; /* Light blue matching your screenshot */
            font-family: sans-serif;
        }
        canvas { display: block; }
        #drop-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 0, 0, 0.5);
            font-weight: bold;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
    
    <!-- Import Three.js via Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="drop-hint">Drag & Drop Any Image Here</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Application State ---
        let scene, camera, renderer, controls;
        let instancedMesh;
        let currentImageData = null;
        let heightMultiplier = 15;

        // Maximum resolution to process
        const MAX_RESOLUTION = 120; 
        
        // Auto-load a sample image to show it working immediately
        const DEFAULT_IMAGE_URL = "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=400&auto=format&fit=crop";

        // --- Initialization ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#5ce1e6'); 
            scene.fog = new THREE.Fog('#5ce1e6', 50, 250);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 80, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 

            // Lighting setup optimized for voxel shading
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(50, 100, 30);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.left = -60;
            dirLight.shadow.camera.right = 60;
            dirLight.shadow.camera.top = 60;
            dirLight.shadow.camera.bottom = -60;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0xaaccff, 0.4);
            fillLight.position.set(-50, 50, -50);
            scene.add(fillLight);

            window.addEventListener('resize', onWindowResize);
            
            // Setup silent drag & drop functionality for local images
            setupDragAndDrop();

            // Load default image initially
            loadImageUrl(DEFAULT_IMAGE_URL);

            animate();
        }

        // --- Core Voxelization Logic ---
        function generateVoxels() {
            if (!currentImageData) return;
            
            if (instancedMesh) {
                scene.remove(instancedMesh);
                instancedMesh.dispose();
            }

            const { width, height, data } = currentImageData;
            const totalVoxels = width * height;

            // Geometry: size 0.9 gives a 0.1 gap between voxels
            const geometry = new THREE.BoxGeometry(0.9, 1, 0.9);
            const material = new THREE.MeshStandardMaterial({ 
                roughness: 0.8, 
                metalness: 0.1 
            });

            instancedMesh = new THREE.InstancedMesh(geometry, material, totalVoxels);
            instancedMesh.castShadow = true;
            instancedMesh.receiveShadow = true;

            const dummy = new THREE.Object3D();
            const color = new THREE.Color();
            let index = 0;

            const offsetX = width / 2;
            const offsetZ = height / 2;

            for (let z = 0; z < height; z++) {
                for (let x = 0; x < width; x++) {
                    const i = (z * width + x) * 4;
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];

                    color.setRGB(r/255, g/255, b/255);
                    instancedMesh.setColorAt(index, color);

                    const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
                    
                    let voxelY = luminance * heightMultiplier;
                    if (voxelY < 0.2) voxelY = 0.2; 

                    dummy.position.set(x - offsetX, voxelY / 2, z - offsetZ);
                    dummy.scale.set(1, voxelY, 1);
                    
                    dummy.updateMatrix();
                    instancedMesh.setMatrixAt(index, dummy.matrix);
                    
                    index++;
                }
            }

            scene.add(instancedMesh);
            
            camera.position.set(0, Math.max(width, height) * 0.8, Math.max(width, height));
            controls.target.set(0, 0, 0);
        }

        // --- Image Handling ---
        function processImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            let w = img.width;
            let h = img.height;
            if (w > MAX_RESOLUTION || h > MAX_RESOLUTION) {
                if (w > h) {
                    h = Math.floor(h * (MAX_RESOLUTION / w));
                    w = MAX_RESOLUTION;
                } else {
                    w = Math.floor(w * (MAX_RESOLUTION / h));
                    h = MAX_RESOLUTION;
                }
            }

            canvas.width = w;
            canvas.height = h;
            
            ctx.drawImage(img, 0, 0, w, h);
            currentImageData = ctx.getImageData(0, 0, w, h);

            generateVoxels();
            document.getElementById('drop-hint').style.opacity = '0';
        }

        function loadImageUrl(url) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => processImage(img);
            img.src = url;
        }

        // --- Drag & Drop (No UI Frontend) ---
        function setupDragAndDrop() {
            window.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                document.getElementById('drop-hint').style.opacity = '1';
            });

            window.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if(instancedMesh) document.getElementById('drop-hint').style.opacity = '0';
            });

            window.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const file = e.dataTransfer.files[0];
                if (!file || !file.type.startsWith('image/')) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = () => processImage(img);
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // --- Window Resize & Animation ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
