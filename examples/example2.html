<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, instancedMesh;
    const MAX_RESOLUTION = 100;
    const HEIGHT_MULT = 12;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5ce1e6);
        scene.fog = new THREE.Fog(0x5ce1e6, 60, 280);

        camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 1000);
        camera.position.set(0, 70, 110);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(devicePixelRatio);
        renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        const amb = new THREE.AmbientLight(0xffffff, 0.75);
        scene.add(amb);

        const dir = new THREE.DirectionalLight(0xffffff, 1.3);
        dir.position.set(50, 100, 30);
        dir.castShadow = true;
        dir.shadow.mapSize.set(2048, 2048);
        dir.shadow.camera.left = dir.shadow.camera.bottom = -70;
        dir.shadow.camera.right = dir.shadow.camera.top = 70;
        scene.add(dir);

        const fill = new THREE.DirectionalLight(0xaaccff, 0.4);
        fill.position.set(-50, 40, -50);
        scene.add(fill);

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        loadEmbeddedImage();
        animate();
    }

    function generateVoxels(imageData) {
        if (instancedMesh) { scene.remove(instancedMesh); instancedMesh.dispose(); }
        const { width, height, data } = imageData;
        const geo = new THREE.BoxGeometry(0.9, 1, 0.9);
        const mat = new THREE.MeshStandardMaterial({ roughness: 0.75, metalness: 0.05 });
        instancedMesh = new THREE.InstancedMesh(geo, mat, width * height);
        instancedMesh.castShadow = instancedMesh.receiveShadow = true;

        const dummy = new THREE.Object3D();
        const col = new THREE.Color();
        let idx = 0;
        const ox = width / 2, oz = height / 2;

        for (let z = 0; z < height; z++) {
            for (let x = 0; x < width; x++) {
                const i = (z * width + x) * 4;
                const r = data[i], g = data[i+1], b = data[i+2];
                col.setRGB(r/255, g/255, b/255);
                instancedMesh.setColorAt(idx, col);
                let h = ((0.299*r + 0.587*g + 0.114*b) / 255) * HEIGHT_MULT;
                if (h < 0.2) h = 0.2;
                dummy.position.set(x - ox, h / 2, z - oz);
                dummy.scale.set(1, h, 1);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(idx, dummy.matrix);
                idx++;
            }
        }
        scene.add(instancedMesh);
        const s = Math.max(width, height);
        camera.position.set(0, s * 0.75, s * 1.05);
        controls.target.set(0, 0, 0);
    }

    function loadEmbeddedImage() {
        const img = new Image();
        img.onload = () => {
            const c = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > MAX_RESOLUTION || h > MAX_RESOLUTION) {
                if (w > h) { h = Math.floor(h * MAX_RESOLUTION / w); w = MAX_RESOLUTION; }
                else { w = Math.floor(w * MAX_RESOLUTION / h); h = MAX_RESOLUTION; }
            }
            c.width = w; c.height = h;
            const ctx = c.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0, w, h);
            generateVoxels(ctx.getImageData(0, 0, w, h));
        };
